# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano//zmk" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano//zmk
#     shield: reviung41
#
---
# See: https://github.com/zmkfirmware/zmk/blob/main/.github/workflows/build-user-config.yml
include:
  # Ferris sweep
  - board: nice_nano//zmk
    shield: cradio_left
    artifact-name: ferris_sweep_left-nice_nano
  - board: nice_nano//zmk
    shield: cradio_left_patched_broken_pin6
    artifact-name: ferris_sweep_left_patched_broken_pin_6_left-nice_nano
  - board: nice_nano//zmk
    shield: cradio_right
    artifact-name: ferris_sweep_right-nice_nano

  # Corne
  - board: nice_nano//zmk
    shield: corne_left
    artifact-name: corne_left_nice_nano
  - board: nice_nano//zmk
    shield: corne_right
    artifact-name: corne_right_nice_nano
  - board: nice_nano//zmk
    shield: corne_left
    snippet: zmk-usb-logging
    artifact-name: corne_left_nice_nano_with_logging
  - board: nice_nano//zmk
    shield: corne_right
    snippet: zmk-usb-logging
    artifact-name: corne_right_nice_nano_with_logging

  # Aurora Corne
  - board: nice_nano//zmk
    shield: splitkb_aurora_corne_left
    artifact-name: splitkb_aurora_corne_left_nice_nano
  - board: nice_nano//zmk
    shield: splitkb_aurora_corne_right
    artifact-name: splitkb_aurora_corne_right_nice_nano
  - board: nice_nano//zmk
    shield: splitkb_aurora_corne_left
    snippet: zmk-usb-logging
    artifact-name: splitkb_aurora_corne_left_nice_nano_with_logging
  - board: nice_nano//zmk
    shield: splitkb_aurora_corne_right
    snippet: zmk-usb-logging
    artifact-name: splitkb_aurora_corne_right_nice_nano_with_logging

  # Reset
  - board: nice_nano//zmk
    shield: settings_reset